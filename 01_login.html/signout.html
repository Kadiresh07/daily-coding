<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign out</title>
</head>
<style>
    body{
        background-color: rgb(247, 224, 126);
        padding: 0%;
        margin: 0%;
        height: 100vh;
        display:flex;
        justify-content:center;
        align-items: center;
    }

    .card{
        background-color: rgb(239, 243, 229);
        border-radius: 10px;
        padding: 40px;
    }

    form{
        display: flex;
        flex-direction: column;
    }
    input{
        padding: 10px;
        margin-bottom: 10px;
    }

    
    
</style>
<body>
    <div class="card">
        <form>
            <h1>sign out</h1>
            <input type="email" name="email" placeholder="emailname">
            <input type="password" name="passwords" placeholder="passwords">
            <button type="submit"> submit</button>
        </form>
    </div>
</body>
</html>
